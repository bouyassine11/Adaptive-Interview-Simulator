services:
  postgres:
    image: postgres:17-alpine
    container_name: skilladapt-db
    environment:
      POSTGRES_USER: skilladapt
      POSTGRES_PASSWORD: skilladapt
      POSTGRES_DB: skilladapt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
